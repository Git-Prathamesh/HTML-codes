<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
</head>
<body bgcolor="pink">

    <form>
        <h3>Student Registration Form</h3>

        Username: <input type="text" placeholder="Enter your username"><br><br>
        Password: <input type="password"><br><br>
        
        Email: <input type="email"><br><br>
        
        Age: <input type="number" value="18" style="width: 50px;"><br><br>
        
        Date of Birth: <input type="date"><br><br>
        
        Profile Picture: <input type="file"><br><br>
        
        Gender: 
        <input type="radio" name="gen" value="male"> Male
        <input type="radio" name="gen" value="female"> Female<br><br>
        
        Interests: 
        <input type="checkbox" name="int" value="coding"> Coding
        <input type="checkbox" name="int" value="music"> Music<br><br>
        
        Country: 
        <select>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
        </select><br><br>
        
        Bio:<br>
        <textarea rows="4" cols="40">Tell us about yourself</textarea><br><br>
        
        Favorite Color: <input type="color" value="#0000FF"><br><br>
        
        Experience (Years): <input type="range" min="0" max="10"><br><br>
        
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
