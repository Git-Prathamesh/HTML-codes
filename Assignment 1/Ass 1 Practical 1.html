<!DOCTYPE html>
<html>
<head>
    <title>Text Formatting Showcase</title>
</head>
<body>
    <h1>HTML Text Formatting</h1>
    <p>
        <b>This is bold text</b> and <strong>this is strong emphasis text</strong>.<br>
        <i>This is italic text</i> and <em>this is emphasized text</em>.<br>
        <u>This is underlined text</u>.<br>
        <mark>This is highlighted text</mark>.
    </p>
    <p>
        We can <del>strike through</del> words and <ins>insert</ins> new text.
    </p>
    <p>
        Chemical formula: H<sub>2</sub>O<br>
        Einstein's equation: E=mc<sup>2</sup>
    </p>
    <footer>
        <small>This is small text.</small>
    </footer>
</body>
</html>
